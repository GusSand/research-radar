<svg viewBox="0 0 500 210" xmlns="http://www.w3.org/2000/svg" aria-label="HMNS: jailbreak geometry — attack vector in refusal direction nullspace bypasses safety">
  <rect width="500" height="210" fill="#fff"/>
  <!-- coordinate axes -->
  <line x1="80" y1="170" x2="420" y2="170" stroke="#ccc" stroke-width="1"/>
  <line x1="250" y1="30" x2="250" y2="180" stroke="#ccc" stroke-width="1"/>
  <text x="425" y="174" font-family="monospace" font-size="9" fill="#aaa">representation space</text>
  <!-- refusal direction vector -->
  <path d="M250 170 L180 80" stroke="#1a6e3c" stroke-width="2" marker-end="url(#ha)"/>
  <text x="155" y="75" font-family="Georgia,serif" font-size="11" fill="#1a6e3c" font-style="italic">r̂</text>
  <text x="120" y="88" font-family="monospace" font-size="9" fill="#1a6e3c">refusal dir.</text>
  <!-- nullspace shading (orthogonal to r̂) -->
  <path d="M310 100 L390 130 L390 170 L310 170 Z" fill="#ddd" opacity="0.5"/>
  <text x="370" y="148" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">nullspace</text>
  <text x="370" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#888">of r̂</text>
  <!-- harmless prompt point -->
  <circle cx="200" cy="130" r="5" fill="#1a6e3c"/>
  <text x="195" y="148" font-family="monospace" font-size="8" fill="#1a6e3c">harmless</text>
  <!-- harmful prompt point -->
  <circle cx="210" cy="95" r="5" fill="#b02020"/>
  <text x="185" y="90" font-family="monospace" font-size="8" fill="#b02020">harmful</text>
  <!-- HMNS attack: move harmful into nullspace -->
  <path d="M210 95 Q280 90 340 130" stroke="#b02020" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#hr)"/>
  <circle cx="340" cy="130" r="5" fill="#a05c00"/>
  <text x="345" y="126" font-family="monospace" font-size="8" fill="#a05c00">attack</text>
  <text x="345" y="138" font-family="monospace" font-size="8" fill="#a05c00">in nullspace</text>
  <!-- annotation -->
  <text x="250" y="200" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#b02020" font-style="italic">probe sees r̂ component → 0; refusal fires → 0</text>
  <defs>
    <marker id="ha" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5 Z" fill="#1a6e3c"/></marker>
    <marker id="hr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L0,7 L7,3.5 Z" fill="#b02020"/></marker>
  </defs>
</svg>
