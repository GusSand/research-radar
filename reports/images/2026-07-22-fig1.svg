<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" aria-label="CircuitKIT pipeline: Discovery → Circuit (serialized) → Evaluation → Application">
  <rect width="500" height="200" fill="#fff"/>
  <rect x="20" y="70" width="100" height="60" rx="5" fill="none" stroke="#0d7377" stroke-width="1.5"/>
  <text x="70" y="97" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#0d7377">Discovery</text>
  <text x="70" y="114" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">EAP · ACDC</text>
  <rect x="195" y="60" width="110" height="80" rx="5" fill="none" stroke="#a05c00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="250" y="87" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#a05c00">Circuit</text>
  <text x="250" y="104" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">serialized</text>
  <text x="250" y="120" text-anchor="middle" font-family="monospace" font-size="9" fill="#888">typed repr.</text>
