  <path d="M120 100 H190" stroke="#999" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>
  <path d="M305 85 Q345 85 375 65" stroke="#999" stroke-width="1.5" fill="none" marker-end="url(#a1)"/>
